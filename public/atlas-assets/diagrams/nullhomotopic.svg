<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- outermost loop (accent, largest) -->
    <path d="M160,95 C160,25 280,25 280,95 C280,165 160,165 160,95 Z"
          fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2" />
    <!-- intermediate loops contracting inward (muted) -->
    <path d="M160,95 C160,50 245,50 245,95 C245,140 160,140 160,95 Z"
          fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.2" stroke-dasharray="4,3" />
    <path d="M160,95 C160,68 215,68 215,95 C215,122 160,122 160,95 Z"
          fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" stroke-dasharray="3,3" />
    <!-- basepoint -->
    <circle cx="160" cy="95" r="4" fill="var(--dia-acc,#a8431d)" />
    <text x="148" y="91" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₀</text>
    <!-- arrows showing contraction direction -->
    <text x="222" y="99" font-size="16" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">←</text>
    <!-- caption -->
    <text x="160" y="175" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">f ≃ const_{x₀}</text>
</svg>

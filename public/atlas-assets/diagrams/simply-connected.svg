<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- filled simply-connected space (disk) -->
    <circle cx="160" cy="92" r="72" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <!-- loop 1 (accent) contracting to center -->
    <path d="M160,92 C160,42 230,42 230,92 C230,142 160,142 160,92 Z"
          fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8" stroke-dasharray="5,3" />
    <!-- loop 2 tilted (muted) -->
    <path d="M160,92 C120,55 90,92 120,130 C150,165 200,130 160,92 Z"
          fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.3" stroke-dasharray="5,3" />
    <!-- convergence arrows toward basepoint -->
    <line x1="215" y1="92" x2="176" y2="92" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" marker-end="url(#ar)" />
    <line x1="130" y1="118" x2="152" y2="100" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" marker-end="url(#ar)" />
    <defs>
        <marker id="ar" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-mut,#9a8f7d)" />
        </marker>
    </defs>
    <!-- basepoint -->
    <circle cx="160" cy="92" r="4" fill="var(--dia-acc,#a8431d)" />
    <text x="160" y="82" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₀</text>
    <!-- caption -->
    <text x="160" y="176" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">π₁(X, x₀) = 0</text>
</svg>

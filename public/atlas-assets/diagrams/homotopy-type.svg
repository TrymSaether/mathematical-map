<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- X: disk with a hole (annulus) -->
    <circle cx="82" cy="90" r="56" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <circle cx="82" cy="90" r="22" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2" />
    <text x="82" y="26" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- ≃ -->
    <text x="160" y="97" font-size="22" fill="var(--dia-acc,#a8431d)" text-anchor="middle">≃</text>
    <!-- Y: thin circle (S¹) — same homotopy type -->
    <circle cx="248" cy="90" r="44" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <circle cx="248" cy="90" r="30" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="26" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- caption -->
    <text x="160" y="168" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">same homotopy type, not necessarily homeomorphic</text>
</svg>

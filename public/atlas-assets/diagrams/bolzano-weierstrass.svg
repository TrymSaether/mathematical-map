<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="bwa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)"/></marker>
  </defs>
  <!-- bounded box in R^n -->
  <rect x="36" y="34" width="248" height="112" rx="3" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="60" y="48" font-size="11" fill="var(--dia-ink,#2a2520)" font-style="italic">bounded ⊆ ℝⁿ</text>
  <!-- scattered bounded sequence (muted) -->
  <circle cx="64" cy="96" r="2.3" fill="var(--dia-mut,#9a8f7d)"/>
  <circle cx="96" cy="64" r="2.3" fill="var(--dia-mut,#9a8f7d)"/>
  <circle cx="84" cy="124" r="2.3" fill="var(--dia-mut,#9a8f7d)"/>
  <circle cx="130" cy="108" r="2.3" fill="var(--dia-mut,#9a8f7d)"/>
  <circle cx="120" cy="74" r="2.3" fill="var(--dia-mut,#9a8f7d)"/>
  <!-- convergent subsequence closing onto a cluster point -->
  <circle cx="170" cy="60" r="2.8" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="238" cy="118" r="2.8" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="206" cy="76" r="2.8" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="228" cy="96" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="220" cy="104" r="2.4" fill="var(--dia-acc,#a8431d)"/>
  <path d="M170,60 Q244,72 206,76 Q252,108 228,96 Q236,104 220,104" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#bwa)"/>
  <!-- limit / cluster point -->
  <circle cx="216" cy="102" r="4" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.4"/>
  <circle cx="216" cy="102" r="1.8" fill="var(--dia-acc,#a8431d)"/>
  <text x="160" y="168" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">bounded sequence ⇒ a convergent subsequence</text>
</svg>

<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- nested closed sets shrinking onto a common point -->
  <ellipse cx="148" cy="92" rx="120" ry="64" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5"/>
  <ellipse cx="158" cy="94" rx="88" ry="48" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"/>
  <ellipse cx="170" cy="96" rx="56" ry="33" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.3"/>
  <ellipse cx="184" cy="98" rx="28" ry="18" fill="var(--dia-acc,#a8431d)" opacity="0.22" stroke="var(--dia-acc,#a8431d)" stroke-width="1.3"/>
  <!-- common point -->
  <circle cx="198" cy="100" r="3.4" fill="var(--dia-acc,#a8431d)"/>
  <text x="206" y="98" font-size="11" fill="var(--dia-acc,#a8431d)" font-style="italic">p</text>
  <!-- labels -->
  <text x="58" y="40" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">F₁ ⊇ F₂ ⊇ F₃ ⊇ …</text>
  <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">finite intersection property  ⇒  ⋂ Fᵢ ≠ ∅</text>
</svg>

<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
    </marker>
    <marker id="ar-muted" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-mut,#9a8f7d)" />
    </marker>
  </defs>

  <!-- X -->
  <ellipse cx="72" cy="88" rx="52" ry="60" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)"
    stroke-width="1.4" />
  <text x="72" y="24" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>

  <!-- U subset of X -->
  <ellipse cx="72" cy="92" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
    stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
  <text x="72" y="81" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>

  <!-- point x -->
  <circle cx="72" cy="92" r="2.6" fill="var(--dia-ink,#2a2520)" />
  <text x="59" y="99" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">x</text>

  <!-- subset annotation X -->
  <text x="72" y="139" font-size="9" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">U ⊆ X</text>

  <!-- Y -->
  <ellipse cx="248" cy="88" rx="52" ry="60" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)"
    stroke-width="1.4" />
  <text x="248" y="24" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>

  <!-- f(U) subset of Y -->
  <ellipse cx="248" cy="92" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
    stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
  <text x="248" y="81" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">f(U)</text>

  <!-- point f(x) -->
  <circle cx="248" cy="92" r="2.6" fill="var(--dia-ink,#2a2520)" />
  <text x="265" y="99" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f(x)</text>

  <!-- subset annotation Y -->
  <text x="248" y="139" font-size="9" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">f(U) ⊆
    Y</text>

  <!-- homeomorphism symbol -->
  <text x="160" y="91" font-size="18" fill="var(--dia-ink,#2a2520)" text-anchor="middle">≅</text>

  <!-- forward map -->
  <path d="M124,68 C140,54 178,54 194,68" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"
    marker-end="url(#ar)" />
  <text x="159" y="50" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>

  <!-- inverse map -->
  <path d="M196,116 C178,132 142,132 124,116" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.3"
    stroke-dasharray="4,3" marker-end="url(#ar-muted)" />
  <text x="160" y="148" font-size="11" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">f⁻¹</text>

  <!-- compact caption -->
  <text x="160" y="170" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">
    homeomorphism: X ≅ Y
  </text>
</svg>

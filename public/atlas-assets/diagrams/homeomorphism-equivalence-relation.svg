<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader', Georgia, serif" role="img">
      <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                  <path d="M0,0 L8,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
            </marker>

            <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                  <path d="M0,0 L8,3 L0,6 Z" fill="var(--dia-acc,#a8431d)" />
            </marker>

            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.12" />
            </filter>
      </defs>

      <!-- background -->
      <rect width="720" height="300" rx="22" fill="var(--dia-paper,#f7f1e8)" />

      <!-- X shape -->
      <path d="M75,145
           C70,95 105,60 155,68
           C205,76 225,108 210,150
           C195,195 150,218 110,200
           C82,188 80,170 75,145 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.8"
            filter="url(#softShadow)" />

      <!-- Y shape -->
      <path d="M295,145
           C300,96 335,67 382,75
           C430,83 456,118 438,160
           C420,202 375,215 335,195
           C305,180 292,165 295,145 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)"
            stroke-width="1.8" filter="url(#softShadow)" />

      <!-- Z shape -->
      <path d="M520,145
           C512,105 545,70 595,70
           C645,70 674,105 660,150
           C646,195 600,220 560,198
           C532,183 526,165 520,145 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)"
            stroke-width="1.8" filter="url(#softShadow)" />

      <!-- internal open-set-like marks -->
      <ellipse cx="145" cy="132" rx="34" ry="22" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.5"
            stroke-dasharray="4 4" />

      <ellipse cx="372" cy="137" rx="34" ry="23" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.5"
            stroke-dasharray="4 4" />

      <ellipse cx="590" cy="135" rx="35" ry="22" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.5"
            stroke-dasharray="4 4" />

      <!-- labels -->
      <text x="145" y="45" font-size="24" text-anchor="middle" fill="var(--dia-ink,#2a2520)"
            font-style="italic">X</text>
      <text x="370" y="45" font-size="24" text-anchor="middle" fill="var(--dia-ink,#2a2520)"
            font-style="italic">Y</text>
      <text x="590" y="45" font-size="24" text-anchor="middle" fill="var(--dia-ink,#2a2520)"
            font-style="italic">Z</text>

      <!-- f arrow X to Y -->
      <path d="M225,132 C250,105 270,105 295,132" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2"
            marker-end="url(#arrowAccent)" />
      <text x="260" y="94" font-size="18" text-anchor="middle" fill="var(--dia-acc,#a8431d)"
            font-style="italic">f</text>

      <!-- f inverse arrow -->
      <path d="M295,170 C270,198 250,198 225,170" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.7"
            marker-end="url(#arrow)" />
      <text x="260" y="218" font-size="17" text-anchor="middle" fill="var(--dia-ink,#2a2520)"
            font-style="italic">f⁻¹</text>

      <!-- g arrow Y to Z -->
      <path d="M445,132 C470,105 495,105 520,132" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2"
            marker-end="url(#arrowAccent)" />
      <text x="482" y="94" font-size="18" text-anchor="middle" fill="var(--dia-acc,#a8431d)"
            font-style="italic">g</text>

      <!-- g inverse arrow -->
      <path d="M520,170 C495,198 470,198 445,170" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.7"
            marker-end="url(#arrow)" />
      <text x="482" y="218" font-size="17" text-anchor="middle" fill="var(--dia-ink,#2a2520)"
            font-style="italic">g⁻¹</text>

      <!-- identity loop -->
      <path d="M96,82
           C60,62 55,105 83,106" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5"
            marker-end="url(#arrow)" />
      <text x="58" y="72" font-size="16" fill="var(--dia-ink,#2a2520)" font-style="italic">id</text>

      <!-- composite arrow -->
      <path d="M155,250 C260,285 475,285 585,250" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2.2"
            marker-end="url(#arrowAccent)" />
      <text x="370" y="278" font-size="18" text-anchor="middle" fill="var(--dia-acc,#a8431d)" font-style="italic">g ∘
            f</text>

      <!-- theorem summary -->
      <text x="360" y="248" font-size="16" text-anchor="middle" fill="var(--dia-muted,#6f6257)">
            X ≅ Y and Y ≅ Z ⇒ X ≅ Z
      </text>
</svg>

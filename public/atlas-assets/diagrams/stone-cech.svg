<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <defs>
    <marker id="sca" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)"/></marker>
    <marker id="scd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)"/></marker>
  </defs>
  <!-- nodes of the commuting triangle -->
  <text x="58" y="56" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
  <text x="206" y="56" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">βX</text>
  <text x="206" y="150" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">K</text>
  <!-- dense embedding X -> βX -->
  <line x1="74" y1="50" x2="190" y2="50" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" marker-end="url(#sca)"/>
  <text x="132" y="42" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">ι  (dense)</text>
  <!-- any map f: X -> K compact Hausdorff -->
  <line x1="66" y1="62" x2="196" y2="140" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" marker-end="url(#sca)"/>
  <text x="112" y="116" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
  <!-- unique extension βX -> K -->
  <line x1="206" y1="64" x2="206" y2="134" stroke="var(--dia-acc,#a8431d)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#scd)"/>
  <text x="224" y="102" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">∃! βf</text>
  <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">K compact Hausdorff  ⇒  f factors uniquely through βX</text>
</svg>

<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc2,#1f6f6b)" />
        </marker>
    </defs>
    <!-- X -->
    <ellipse cx="72" cy="90" rx="52" ry="60" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="72" y="28" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- Y -->
    <ellipse cx="248" cy="90" rx="52" ry="60" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="28" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- f: X → Y -->
    <path d="M124,68 C155,50 185,50 196,68" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" marker-end="url(#ar)" />
    <text x="160" y="46" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <!-- g: Y → X -->
    <path d="M196,112 C175,132 150,132 124,112" fill="none" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.5" marker-end="url(#ar2)" />
    <text x="160" y="142" font-size="12" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">g</text>
    <!-- homotopy conditions -->
    <text x="160" y="88" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle">g∘f ≃ id_X</text>
    <text x="160" y="104" font-size="10" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle">f∘g ≃ id_Y</text>
    <!-- caption -->
    <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">X ≃ Y  (same homotopy type)</text>
</svg>

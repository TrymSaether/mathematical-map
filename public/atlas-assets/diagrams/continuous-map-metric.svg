<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ara" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)" />
        </marker>
    </defs>

    <!-- Space X -->
    <ellipse cx="76" cy="95" rx="57" ry="67" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="76" y="27" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>

    <!-- Space Y -->
    <ellipse cx="244" cy="95" rx="57" ry="67" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="244" y="27" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>

    <!-- δ-ball around x -->
    <circle cx="76" cy="98" r="28" fill="var(--dia-ink,#2a2520)" fill-opacity="0.07"
        stroke="var(--dia-ink,#2a2520)" stroke-width="1.3" stroke-dasharray="4,3" />
    <!-- δ label and brace -->
    <line x1="76" y1="98" x2="104" y2="98" stroke="var(--dia-ink,#2a2520)" stroke-width="1" />
    <text x="91" y="93" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">δ</text>
    <!-- point x -->
    <circle cx="76" cy="98" r="3" fill="var(--dia-ink,#2a2520)" />
    <text x="76" y="114" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">x</text>

    <!-- ε-ball around f(x) -->
    <circle cx="244" cy="98" r="28" fill="var(--dia-acc,#a8431d)" fill-opacity="0.10"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.3" stroke-dasharray="4,3" />
    <!-- ε label and brace -->
    <line x1="244" y1="98" x2="272" y2="98" stroke="var(--dia-acc,#a8431d)" stroke-width="1" />
    <text x="259" y="93" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">ε</text>
    <!-- point f(x) -->
    <circle cx="244" cy="98" r="3" fill="var(--dia-acc,#a8431d)" />
    <text x="244" y="114" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">f(x)</text>

    <!-- Main f arrow -->
    <path d="M133,60 C155,46 175,46 197,60" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" marker-end="url(#ar)" />
    <text x="165" y="44" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>

    <!-- Caption -->
    <text x="160" y="172" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">d(x,y) &lt; δ  ⟹  d(f(x),f(y)) &lt; ε</text>
</svg>

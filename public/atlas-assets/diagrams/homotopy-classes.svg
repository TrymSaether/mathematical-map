    <text x="242" y="80" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="start" font-style="italic">[g]</text>
    <!-- caption -->
    <text x="155" y="173" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">π₁(X, x₀) = { [f], [g], … }</text>

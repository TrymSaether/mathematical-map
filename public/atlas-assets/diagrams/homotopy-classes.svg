    <text x="42" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₀</text>
    <!-- class [f]: two nearby loops (accent) -->
    <path d="M55,95 C100,58 175,58 175,95 C175,132 100,132 55,95 Z" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8" />
    <path d="M55,95 C100,68 165,68 165,95 C165,122 100,122 55,95 Z" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1" stroke-dasharray="3,2" />
    <text x="192" y="99" font-size="22" fill="var(--dia-acc,#a8431d)" text-anchor="middle">}</text>
    <text x="206" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="start" font-style="italic">[f]</text>
    <!-- class [g]: two larger loops (ink) -->
    <path d="M55,95 C100,32 210,32 210,95 C210,158 100,158 55,95 Z" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.8" />

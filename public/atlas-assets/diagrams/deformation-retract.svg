<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc2,#1f6f6b)" />
        </marker>
    </defs>
    <!-- t=0: full space X (largest, muted) -->
    <circle cx="160" cy="92" r="72" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1.2" stroke-dasharray="5,3" />
    <text x="222" y="38" font-size="12" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">X  (t=0)</text>
    <!-- t=0.5: intermediate stage -->
    <circle cx="160" cy="92" r="50" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" stroke-dasharray="3,3" />
    <!-- t=1: retract A (solid, accent) -->
    <circle cx="160" cy="92" r="28" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#a8431d)" stroke-width="2" />
    <text x="160" y="96" font-size="13" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">A</text>
    <!-- inward arrows showing deformation -->
    <line x1="222" y1="92" x2="192" y2="92" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <line x1="195" y1="143" x2="175" y2="120" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <line x1="125" y1="143" x2="145" y2="120" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <line x1="98" y1="92" x2="128" y2="92" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <line x1="125" y1="41" x2="145" y2="64" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <line x1="195" y1="41" x2="175" y2="64" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.2" marker-end="url(#ar)" />
    <!-- caption -->
    <text x="160" y="174" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">H: X × I → X,  H₀ = id,  H₁(X) = A</text>
</svg>

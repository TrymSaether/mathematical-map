<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- the compact product space -->
  <rect x="24" y="34" width="272" height="116" rx="8" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5"/>
  <text x="160" y="52" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">[0,1]^[0,1]  — compact (Tychonoff)</text>
  <!-- a sequence with no convergent subsequence: scattered, no clustering -->
  <circle cx="52" cy="92" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="92" cy="120" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="124" cy="80" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="160" cy="124" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="196" cy="78" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="232" cy="122" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <circle cx="268" cy="84" r="2.6" fill="var(--dia-acc,#a8431d)"/>
  <text x="52" y="84" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₁</text>
  <text x="268" y="76" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₇</text>
  <!-- no limit symbol -->
  <text x="160" y="100" font-size="20" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">∄ lim</text>
  <text x="160" y="170" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">compact, yet no subsequence converges</text>
</svg>

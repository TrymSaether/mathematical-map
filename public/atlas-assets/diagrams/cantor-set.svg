<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- iterated removal of middle thirds -->
  <!-- level 0 -->
  <rect x="20" y="34" width="280" height="14" fill="var(--dia-ink,#2a2520)"/>
  <text x="160" y="30" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">C₀ = [0,1]</text>
  <!-- level 1: 2 pieces -->
  <rect x="20" y="58" width="93.3" height="13" fill="var(--dia-ink,#2a2520)"/>
  <rect x="206.7" y="58" width="93.3" height="13" fill="var(--dia-ink,#2a2520)"/>
  <!-- level 2: 4 pieces -->
  <rect x="20" y="82" width="31.1" height="12" fill="var(--dia-acc,#a8431d)"/>
  <rect x="82.2" y="82" width="31.1" height="12" fill="var(--dia-acc,#a8431d)"/>
  <rect x="206.7" y="82" width="31.1" height="12" fill="var(--dia-acc,#a8431d)"/>
  <rect x="268.9" y="82" width="31.1" height="12" fill="var(--dia-acc,#a8431d)"/>
  <!-- level 3: 8 pieces -->
  <g fill="var(--dia-acc,#a8431d)">
    <rect x="20" y="104" width="10.4" height="11"/>
    <rect x="40.7" y="104" width="10.4" height="11"/>
    <rect x="82.2" y="104" width="10.4" height="11"/>
    <rect x="102.9" y="104" width="10.4" height="11"/>
    <rect x="206.7" y="104" width="10.4" height="11"/>
    <rect x="227.4" y="104" width="10.4" height="11"/>
    <rect x="268.9" y="104" width="10.4" height="11"/>
    <rect x="289.6" y="104" width="10.4" height="11"/>
  </g>
  <!-- level 4: 16 slivers -->
  <g fill="var(--dia-acc,#a8431d)">
    <rect x="20" y="124" width="3.4" height="10"/><rect x="27" y="124" width="3.4" height="10"/>
    <rect x="40.7" y="124" width="3.4" height="10"/><rect x="47.6" y="124" width="3.4" height="10"/>
    <rect x="82.2" y="124" width="3.4" height="10"/><rect x="89.2" y="124" width="3.4" height="10"/>
    <rect x="102.9" y="124" width="3.4" height="10"/><rect x="109.9" y="124" width="3.4" height="10"/>
    <rect x="206.7" y="124" width="3.4" height="10"/><rect x="213.7" y="124" width="3.4" height="10"/>
    <rect x="227.4" y="124" width="3.4" height="10"/><rect x="234.3" y="124" width="3.4" height="10"/>
    <rect x="268.9" y="124" width="3.4" height="10"/><rect x="275.9" y="124" width="3.4" height="10"/>
    <rect x="289.6" y="124" width="3.4" height="10"/><rect x="296.6" y="124" width="3.4" height="10"/>
  </g>
  <text x="160" y="152" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle">⋮</text>
  <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">C = C₀ ∩ C₁ ∩ C₂ ∩ ⋯ : compact, uncountable, measure zero</text>
</svg>

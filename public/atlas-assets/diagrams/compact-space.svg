<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- Space X -->
    <rect x="30" y="55" width="260" height="80" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" />
    <text x="292" y="75" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- large open cover (muted, many strips) -->
    <rect x="32" y="46" width="60" height="22" rx="2" fill="var(--dia-mut,#9a8f7d)" opacity="0.3" stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" />
    <rect x="76" y="42" width="60" height="22" rx="2" fill="var(--dia-mut,#9a8f7d)" opacity="0.3" stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" />
    <rect x="126" y="46" width="60" height="22" rx="2" fill="var(--dia-mut,#9a8f7d)" opacity="0.3" stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" />
    <rect x="174" y="42" width="60" height="22" rx="2" fill="var(--dia-mut,#9a8f7d)" opacity="0.3" stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" />
    <rect x="220" y="46" width="68" height="22" rx="2" fill="var(--dia-mut,#9a8f7d)" opacity="0.3" stroke="var(--dia-mut,#9a8f7d)" stroke-width="0.8" />
    <text x="160" y="38" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">open cover 𝒰</text>
    <!-- finite subcover: only 3 highlighted -->
    <rect x="32" y="103" width="86" height="22" rx="2" fill="var(--dia-acc,#a8431d)" opacity="0.4" stroke="var(--dia-acc,#a8431d)" stroke-width="1.3" />
    <rect x="110" y="103" width="86" height="22" rx="2" fill="var(--dia-acc2,#1f6f6b)" opacity="0.4" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.3" />
    <rect x="188" y="103" width="100" height="22" rx="2" fill="var(--dia-acc,#a8431d)" opacity="0.3" stroke="var(--dia-acc,#a8431d)" stroke-width="1.3" />
    <text x="160" y="143" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">finite subcover</text>
</svg>

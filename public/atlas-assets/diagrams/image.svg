<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ara" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)" />
        </marker>
    </defs>
    <!-- Domain A -->
    <ellipse cx="76" cy="95" rx="54" ry="64" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="76" y="28" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">A</text>
    <!-- points in A -->
    <circle cx="76" cy="72" r="2.8" fill="var(--dia-ink,#2a2520)" />
    <circle cx="76" cy="95" r="2.8" fill="var(--dia-ink,#2a2520)" />
    <circle cx="76" cy="118" r="2.8" fill="var(--dia-ink,#2a2520)" />
    <!-- Codomain B -->
    <ellipse cx="248" cy="95" rx="54" ry="64" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="28" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">B</text>
    <!-- image f(A) highlighted as blob inside B -->
    <ellipse cx="242" cy="95" rx="28" ry="40" fill="var(--dia-acc,#a8431d)" fill-opacity="0.18"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.5" stroke-dasharray="4,3" />
    <text x="275" y="65" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">f(A)</text>
    <!-- point outside f(A) in B -->
    <circle cx="272" cy="118" r="2.5" fill="var(--dia-mut,#9a8f7d)" />
    <!-- image points -->
    <circle cx="242" cy="78" r="2.8" fill="var(--dia-acc,#a8431d)" />
    <circle cx="242" cy="95" r="2.8" fill="var(--dia-acc,#a8431d)" />
    <circle cx="242" cy="112" r="2.8" fill="var(--dia-acc,#a8431d)" />
    <!-- arrows A → f(A) -->
    <path d="M80,72 C140,72 190,78 234,78" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2" marker-end="url(#ar)" />
    <path d="M80,95 C140,95 190,95 234,95" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2" marker-end="url(#ar)" />
    <path d="M80,118 C140,118 190,112 234,112" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2" marker-end="url(#ar)" />
    <!-- f label -->
    <path d="M130,58 C155,44 180,44 200,58" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" marker-end="url(#ar)" />
    <text x="165" y="42" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <!-- caption -->
    <text x="160" y="174" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">f(A) = { f(a) : a &#x2208; A } &#x2286; B</text>
</svg>

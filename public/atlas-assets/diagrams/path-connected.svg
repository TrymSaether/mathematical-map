<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- Space X -->
    <ellipse cx="160" cy="95" rx="138" ry="70" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="160" y="22" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- Path between x and y (accent, curved) -->
    <path d="M60,105 C100,45 220,45 260,105" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2" />
    <text x="160" y="52" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">γ</text>
    <!-- Points -->
    <circle cx="60" cy="105" r="4" fill="var(--dia-acc,#a8431d)" />
    <text x="48" y="122" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x</text>
    <circle cx="260" cy="105" r="4" fill="var(--dia-ink,#2a2520)" />
    <text x="272" y="122" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">y</text>
    <!-- caption -->
    <text x="160" y="175" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">∀ x, y ∈ X, ∃ path γ: x → y</text>
</svg>

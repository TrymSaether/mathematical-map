<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc2,#1f6f6b)" />
        </marker>
    </defs>
    <!-- X with property P -->
    <ellipse cx="72" cy="88" rx="52" ry="60" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="72" y="30" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- property P badge on X -->
    <rect x="50" y="80" width="44" height="20" rx="4" fill="var(--dia-acc,#a8431d)" fill-opacity="0.18" stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" />
    <text x="72" y="94" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">P</text>
    <!-- Y with property P -->
    <ellipse cx="248" cy="88" rx="52" ry="60" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="30" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- property P badge on Y -->
    <rect x="226" y="80" width="44" height="20" rx="4" fill="var(--dia-acc,#a8431d)" fill-opacity="0.18" stroke="var(--dia-acc,#a8431d)" stroke-width="1.2" />
    <text x="248" y="94" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">P</text>
    <!-- f (homeomorphism, both directions) -->
    <path d="M124,68 C155,50 180,50 196,68" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4" marker-end="url(#ar)" />
    <text x="160" y="46" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <path d="M196,110 C175,128 150,128 124,110" fill="none" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.3" stroke-dasharray="4,2" marker-end="url(#ar2)" />
    <text x="160" y="138" font-size="11" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">f⁻¹</text>
    <!-- caption -->
    <text x="160" y="170" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">X ≅ Y  ⟹  X has P iff Y has P</text>
</svg>

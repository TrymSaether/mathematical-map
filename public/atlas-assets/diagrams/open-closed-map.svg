<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
    </defs>
    <!-- X -->
    <ellipse cx="72" cy="90" rx="52" ry="60" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)"
        stroke-width="1.4" />
    <text x="72" y="26" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- open set U in X (dashed) -->
    <ellipse cx="72" cy="95" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="72" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>
    <text x="72" y="136" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle">open</text>
    <!-- f arrow -->
    <path d="M124,70 C140,56 178,56 194,70" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.4"
        marker-end="url(#ar)" />
    <text x="159" y="52" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <!-- Y -->
    <ellipse cx="248" cy="90" rx="52" ry="60" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)"
        stroke-width="1.4" />
    <text x="248" y="26" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- f(U) in Y also open (dashed) -->
    <ellipse cx="248" cy="95" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="248" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle"
        font-style="italic">f(U)</text>
    <text x="248" y="136" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle">open</text>
    <!-- caption -->
    <text x="160" y="170" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">open map: U open &#x27F9;
        f(U) open</text>
</svg>

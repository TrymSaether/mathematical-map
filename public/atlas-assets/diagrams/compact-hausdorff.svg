<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- compact space X (solid boundary = closed/bounded feel) -->
  <ellipse cx="160" cy="96" rx="138" ry="62" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6"/>
  <text x="160" y="42" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">compact</text>
  <!-- two distinct points -->
  <circle cx="108" cy="104" r="3" fill="var(--dia-acc,#a8431d)"/>
  <text x="108" y="98" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x</text>
  <circle cx="212" cy="104" r="3" fill="var(--dia-acc2,#1f6f6b)"/>
  <text x="212" y="98" font-size="12" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">y</text>
  <!-- disjoint open neighborhoods (Hausdorff) -->
  <circle cx="108" cy="106" r="30" fill="var(--dia-acc,#a8431d)" opacity="0.16" stroke="var(--dia-acc,#a8431d)" stroke-width="1.3" stroke-dasharray="5 3"/>
  <circle cx="212" cy="106" r="30" fill="var(--dia-acc2,#1f6f6b)" opacity="0.16" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="108" y="142" font-size="9.5" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>
  <text x="212" y="142" font-size="9.5" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">V</text>
  <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">compact + Hausdorff:  U ∩ V = ∅</text>
</svg>

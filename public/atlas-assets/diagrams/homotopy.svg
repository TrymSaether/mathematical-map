<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ara" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc,#a8431d)" />
        </marker>
    </defs>
    <!-- Space X -->
    <ellipse cx="68" cy="95" rx="48" ry="58" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="68" y="30" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- Space Y -->
    <ellipse cx="252" cy="95" rx="48" ry="58" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="252" y="30" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- f₀: upper arc (accent) -->
    <path d="M116,78 C155,44 195,44 204,78" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2" marker-end="url(#ara)" />
    <text x="160" y="40" font-size="12" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">f₀</text>
    <!-- intermediate arcs (muted) -->
    <path d="M116,90 C155,70 195,70 204,90" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" stroke-dasharray="3,2" />
    <path d="M116,102 C155,100 195,100 204,102" fill="none" stroke="var(--dia-mut,#9a8f7d)" stroke-width="1" stroke-dasharray="3,2" />
    <!-- f₁: lower arc (ink) -->
    <path d="M116,114 C155,148 195,148 204,114" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="2" marker-end="url(#ar)" />
    <text x="160" y="165" font-size="12" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f₁</text>
    <!-- deformation label -->
    <text x="160" y="98" font-size="18" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">⇕</text>
    <text x="160" y="113" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">F</text>
</svg>

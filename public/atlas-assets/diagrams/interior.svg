<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader', Georgia, serif" role="img">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
    </defs>

    <!-- Ambient space X -->
    <rect x="24" y="24" width="312" height="172" rx="20" fill="var(--dia-paper,#f4efe6)" stroke="var(--dia-ink,#2a2520)"
        stroke-width="1.5" />

    <text x="44" y="52" font-size="15" fill="var(--dia-ink,#2a2520)" font-style="italic">X</text>

    <!-- Set A -->
    <path d="M96,74
           C130,44 188,48 226,78
           C266,110 260,158 216,176
           C172,195 106,172 82,132
           C62,100 68,82 96,74 Z" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" />

    <text x="236" y="83" font-size="15" fill="var(--dia-ink,#2a2520)" font-style="italic">A</text>

    <!-- Interior Int(A) -->
    <path d="M122,91
           C151,70 190,76 212,101
           C234,126 222,153 190,163
           C154,174 114,150 104,123
           C98,107 104,98 122,91 Z" fill="var(--dia-acc,#a8431d)" opacity="0.35" stroke="var(--dia-acc,#a8431d)"
        stroke-width="1.3" />

    <text x="150" y="133" font-size="14" fill="var(--dia-ink,#2a2520)" font-style="italic">Int(A)</text>

    <!-- Interior point x -->
    <circle cx="156" cy="108" r="3.6" fill="var(--dia-ink,#2a2520)" />

    <text x="164" y="105" font-size="13" fill="var(--dia-ink,#2a2520)" font-style="italic">x</text>

    <!-- Open neighborhood around x -->
    <ellipse cx="156" cy="108" rx="30" ry="21" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.5"
        stroke-dasharray="4 4" />

    <text x="183" y="96" font-size="13" fill="var(--dia-acc,#a8431d)" font-style="italic">U</text>

    <!-- Boundary point y -->
    <circle cx="224" cy="144" r="3.6" fill="var(--dia-ink,#2a2520)" />

    <text x="232" y="149" font-size="13" fill="var(--dia-ink,#2a2520)" font-style="italic">y</text>

    <!-- Leaking neighborhood around boundary point -->
    <ellipse cx="224" cy="144" rx="31" ry="23" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.25"
        stroke-dasharray="3 4" opacity="0.8" />


    <text x="260" y="155" font-size="11" fill="var(--dia-ink,#2a2520)" font-style="italic">leaking nbhd</text>
    <!-- Small formula label -->
    <text x="103" y="59" font-size="13" fill="var(--dia-ink,#2a2520)" font-style="italic">U ⊆ A</text>
</svg>

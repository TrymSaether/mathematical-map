<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- Set A with explicit boundary ring -->
    <ellipse cx="160" cy="92" rx="110" ry="58" fill="var(--dia-fill,#e7ddc9)"
        stroke="var(--dia-ink,#2a2520)" stroke-width="9" stroke-opacity="0.18" />
    <ellipse cx="160" cy="92" rx="110" ry="58" fill="none"
        stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="48" font-size="15" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">A</text>
    <!-- Interior: open core (dashed, no boundary) -->
    <ellipse cx="160" cy="92" rx="82" ry="40" fill="var(--dia-fil2,#d6c9a8)"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="160" y="97" font-size="13" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">Int A</text>
    <!-- caption -->
    <text x="160" y="172" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">largest open set ⊆ A</text>
</svg>

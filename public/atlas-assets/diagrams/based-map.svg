<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader', Georgia, serif" role="img">
    <defs>
        <marker id="arrow-black" viewBox="0 0 6 6" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"
            markerUnits="strokeWidth">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>

        <marker id="arrow-red" viewBox="0 0 6 6" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"
            markerUnits="strokeWidth">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--dia-acc,#a8431d)" />
        </marker>
    </defs>

    <g stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="76" cy="94" rx="54" ry="62" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)"
            stroke-width="1.45" />
        <ellipse cx="244" cy="94" rx="54" ry="62" fill="var(--dia-fill2,#cbb98f)" stroke="var(--dia-ink,#2a2520)"
            stroke-width="1.45" />

        <path d="M79.2,94 C121,94 164,94 238.6,94" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.15"
            marker-end="url(#arrow-red)" />

        <path d="M77,69 C120,55 200,55 243,69" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.15"
            stroke-dasharray="3 4.2" opacity=".56" marker-end="url(#arrow-black)" />
        <path d="M77,119 C120,133 200,133 243,119" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.15"
            stroke-dasharray="3 4.2" opacity=".56" marker-end="url(#arrow-black)" />

        <path d="M132,77 C151,61 169,61 188,77" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.15"
            marker-end="url(#arrow-black)" />
    </g>

    <g fill="var(--dia-ink,#2a2520)" font-style="italic" text-anchor="middle">
        <text x="76" y="25" font-size="14">X</text>
        <text x="244" y="25" font-size="14">Y</text>
        <text x="160" y="58" font-size="13">f</text>
    </g>

    <g fill="var(--dia-ink,#2a2520)">
        <circle cx="76" cy="69" r="2" />
        <circle cx="76" cy="119" r="2" />
        <circle cx="244" cy="69" r="2" />
        <circle cx="244" cy="119" r="2" />
    </g>

    <g fill="var(--dia-acc,#a8431d)">
        <circle cx="76" cy="94" r="4.5" opacity=".1" />
        <circle cx="244" cy="94" r="4.5" opacity=".14" />
        <circle cx="76" cy="94" r="2.8" />
        <circle cx="244" cy="94" r="2.8" />
    </g>

    <g fill="var(--dia-acc,#a8431d)" font-style="italic" text-anchor="middle">
        <text x="56" y="98" font-size="12">x₀</text>
        <text x="264" y="98" font-size="12">y₀</text>
    </g>

    <text x="160" y="170" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">f(x₀) = y₀</text>
</svg>

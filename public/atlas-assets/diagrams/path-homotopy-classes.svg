<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <!-- fixed endpoints -->
    <circle cx="52" cy="95" r="4" fill="var(--dia-acc,#a8431d)" />
    <text x="38" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₀</text>
    <circle cx="268" cy="95" r="4" fill="var(--dia-acc,#a8431d)" />
    <text x="282" y="99" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">x₁</text>
    <!-- class [γ₁]: upper paths (accent) -->
    <path d="M52,95 C110,42 210,42 268,95" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8" />
    <path d="M52,95 C110,55 210,55 268,95" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="1" stroke-dasharray="3,2" />
    <text x="160" y="34" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">[γ₁]</text>
    <!-- class [γ₂]: lower paths (ink) -->
    <path d="M52,95 C110,135 210,135 268,95" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.8" />
    <path d="M52,95 C110,148 210,148 268,95" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1" stroke-dasharray="3,2" />
    <text x="160" y="160" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">[γ₂]</text>
    <!-- caption -->
    <text x="160" y="176" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">paths rel endpoints, grouped by homotopy</text>
</svg>

<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
    </defs>
    <!-- X: connected (one piece, irregular shape suggesting connectivity) -->
    <ellipse cx="72" cy="95" rx="52" ry="62" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-acc,#a8431d)" stroke-width="1.8" />
    <text x="72" y="30" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <text x="72" y="100" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle">connected</text>
    <!-- Y: ambient space -->
    <ellipse cx="248" cy="95" rx="52" ry="62" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="30" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- f(X): connected image (one solid blob inside Y) -->
    <ellipse cx="248" cy="95" rx="32" ry="40" fill="var(--dia-acc,#a8431d)" fill-opacity="0.18" stroke="var(--dia-acc,#a8431d)" stroke-width="1.6" />
    <text x="248" y="100" font-size="9" fill="var(--dia-acc,#a8431d)" text-anchor="middle">f(X)</text>
    <!-- f arrow -->
    <path d="M124,68 C160,50 185,50 196,68" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" marker-end="url(#ar)" />
    <text x="160" y="46" font-size="13" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <!-- caption -->
    <text x="160" y="173" font-size="10" fill="var(--dia-acc,#a8431d)" text-anchor="middle">f(X) connected</text>
</svg>

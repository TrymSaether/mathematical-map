<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
    <defs>
        <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-ink,#2a2520)" />
        </marker>
        <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="var(--dia-acc2,#1f6f6b)" />
        </marker>
    </defs>
    <!-- X -->
    <ellipse cx="72" cy="88" rx="52" ry="60" fill="var(--dia-fill,#e7ddc9)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="72" y="24" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">X</text>
    <!-- open set U in X -->
    <ellipse cx="72" cy="92" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="72" y="96" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">U</text>
    <!-- f: X to Y -->
    <path d="M124,66 C155,48 183,48 196,66" fill="none" stroke="var(--dia-ink,#2a2520)" stroke-width="1.5" marker-end="url(#ar)" />
    <text x="160" y="44" font-size="11" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">f</text>
    <!-- f inverse: Y to X -->
    <path d="M196,112 C175,132 148,132 124,112" fill="none" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1.3" stroke-dasharray="4,2" marker-end="url(#ar2)" />
    <text x="160" y="142" font-size="11" fill="var(--dia-acc2,#1f6f6b)" text-anchor="middle" font-style="italic">f&#x207B;&#xB9;</text>
    <!-- Y -->
    <ellipse cx="248" cy="88" rx="52" ry="60" fill="var(--dia-fil2,#d6c9a8)" stroke="var(--dia-ink,#2a2520)" stroke-width="1.6" />
    <text x="248" y="24" font-size="14" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">Y</text>
    <!-- f(U) in Y also open -->
    <ellipse cx="248" cy="92" rx="26" ry="30" fill="var(--dia-acc,#a8431d)" fill-opacity="0.12"
        stroke="var(--dia-acc,#a8431d)" stroke-width="1.4" stroke-dasharray="4,3" />
    <text x="248" y="96" font-size="11" fill="var(--dia-acc,#a8431d)" text-anchor="middle" font-style="italic">f(U)</text>
    <!-- open biconditional -->
    <text x="160" y="84" font-size="9" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">open</text>
    <text x="160" y="99" font-size="13" fill="var(--dia-acc,#a8431d)" text-anchor="middle">&#x27FA;</text>
    <text x="160" y="113" font-size="9" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">open</text>
    <!-- caption -->
    <text x="160" y="170" font-size="10" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle">bijective continuous f is homeo &#x27FA; f is open</text>
</svg>

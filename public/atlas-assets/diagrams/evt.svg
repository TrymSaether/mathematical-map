<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" font-family="'Newsreader',Georgia,serif" role="img">
  <!-- axes -->
  <line x1="44" y1="150" x2="300" y2="150" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <line x1="52" y1="26" x2="52" y2="158" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <!-- interval [a,b] on the axis -->
  <line x1="76" y1="146" x2="76" y2="154" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <line x1="276" y1="146" x2="276" y2="154" stroke="var(--dia-ink,#2a2520)" stroke-width="1.2"/>
  <text x="76" y="166" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">a</text>
  <text x="276" y="166" font-size="10" fill="var(--dia-ink,#2a2520)" text-anchor="middle" font-style="italic">b</text>
  <text x="262" y="146" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" text-anchor="middle" font-style="italic">[a,b] compact</text>
  <!-- continuous curve attaining a max and a min -->
  <path d="M76,96 C112,150 132,150 150,128 C176,96 196,44 222,44 C246,44 262,70 276,82" fill="none" stroke="var(--dia-acc,#a8431d)" stroke-width="2"/>
  <!-- maximum M -->
  <line x1="52" y1="44" x2="222" y2="44" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="222" y1="44" x2="222" y2="150" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <circle cx="222" cy="44" r="3.4" fill="var(--dia-acc,#a8431d)"/>
  <text x="44" y="47" font-size="11" fill="var(--dia-acc2,#1f6f6b)" text-anchor="end" font-style="italic">M</text>
  <!-- minimum m -->
  <line x1="52" y1="138" x2="138" y2="138" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="138" y1="138" x2="138" y2="150" stroke="var(--dia-acc2,#1f6f6b)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <circle cx="138" cy="138" r="3.4" fill="var(--dia-acc,#a8431d)"/>
  <text x="44" y="141" font-size="11" fill="var(--dia-acc2,#1f6f6b)" text-anchor="end" font-style="italic">m</text>
  <text x="232" y="32" font-size="9.5" fill="var(--dia-mut,#9a8f7d)" font-style="italic">max &amp; min attained</text>
</svg>

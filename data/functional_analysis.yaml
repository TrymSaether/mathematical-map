schema:
  id: functional_analysis_kg_schema_v1
  model: directed_typed_multigraph
  item_kinds: &id001
  - axiom
  - assumption
  - definition
  - structure
  - object
  - property
  - construction
  - notation
  - example
  - non_example
  - counterexample
  - lemma
  - proposition
  - theorem
  - corollary
  - conjecture
  - proof
  - proof_step
  - proof_method
  - application
  dependency_classes:
  - definitional_dependency
  - logical_dependency
  - assumption_dependency
  - construction_dependency
  - notation_dependency
  - pedagogical_dependency
  - historical_dependency
  item_schema:
    required_fields:
      id: string
      label: string
      kind: item_kind
      statement: string|null
      formal_statement: string|null
      definition: string|null
      intuition: string|null
      notation: string|list[string]|null
      assumptions: list[string]
      dependencies:
        definitional_dependency: list[string]
        logical_dependency: list[string]
        assumption_dependency: list[string]
        construction_dependency: list[string]
        notation_dependency: list[string]
        pedagogical_dependency: list[string]
        historical_dependency: list[string]
      outgoing_relations: list[string]
      metadata:
        tags: list[string]
        syllabus_priority: low|medium|high|core
        source: string|null
    additional_fields_by_kind:
      theorem:
        hypotheses: list[string]
        conclusion: string
        proof_methods: list[string]
        related_theorems: list[string]
        examples: list[string]
        applications: list[string]
        variants: list[variant]
      definition:
        introduced_object: string
        genus: string
        differentia: list[string]
        examples: list[string]
        non_examples: list[string]
        equivalent_definitions: list[string]
      proof:
        proves: string
        strategy: string
        steps: list[string]
        uses_methods: list[string]
        uses_results: list[string]
        critical_assumptions: list[string]
      proof_step:
        part_of_proof: string
        step_number: integer
        claim: string
        justification: string
        uses: list[string]
      example:
        satisfies: list[string]
        violates: list[string]
        demonstrates: list[string]
        related_theorems: list[string]
      counterexample:
        satisfies: list[string]
        violates: list[string]
        demonstrates: list[string]
        related_theorems: list[string]
      non_example:
        satisfies: list[string]
        violates: list[string]
        demonstrates: list[string]
        related_theorems: list[string]
  edge_schema:
    required_fields:
      id: string
      source: string
      target: string
      type: edge_type
      dependency_class: dependency_class|null
      label: string
      direction: source_to_target
      confidence: high|medium|low
      notes: string|null
  edge_types:
    defines:
      meaning: source definition defines target item
      allowed_source_kinds:
      - definition
      allowed_target_kinds:
      - structure
      - object
      - property
      - construction
      - notation
      inverse_edge_type: defined_by
      transitive: false
      symmetric: false
    defined_by:
      meaning: source item is defined by target definition
      allowed_source_kinds:
      - structure
      - object
      - property
      - construction
      - notation
      allowed_target_kinds:
      - definition
      inverse_edge_type: defines
      transitive: false
      symmetric: false
    introduces:
      meaning: source field, text, theorem, or construction introduces target item
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: false
      symmetric: false
    assumes:
      meaning: source result or proof assumes target assumption/property/structure
      allowed_source_kinds:
      - theorem
      - lemma
      - proposition
      - corollary
      - proof
      - proof_step
      allowed_target_kinds:
      - assumption
      - property
      - structure
      - axiom
      inverse_edge_type: null
      transitive: false
      symmetric: false
    requires:
      meaning: source item requires target to be stated or constructed
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: true
      symmetric: false
    uses:
      meaning: source proof, theorem, application, or step uses target method/result/item
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: false
      symmetric: false
    proves:
      meaning: source proof establishes target result
      allowed_source_kinds:
      - proof
      - proof_step
      allowed_target_kinds:
      - theorem
      - lemma
      - proposition
      - corollary
      inverse_edge_type: null
      transitive: false
      symmetric: false
    implies:
      meaning: source result logically implies target result
      allowed_source_kinds:
      - axiom
      - lemma
      - proposition
      - theorem
      - corollary
      allowed_target_kinds:
      - lemma
      - proposition
      - theorem
      - corollary
      - application
      - property
      inverse_edge_type: null
      transitive: true
      symmetric: false
    equivalent_to:
      meaning: source and target are mathematically equivalent
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: equivalent_to
      transitive: true
      symmetric: true
    generalizes:
      meaning: source generalizes target
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: specializes
      transitive: true
      symmetric: false
    specializes:
      meaning: source specializes target
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: generalizes
      transitive: true
      symmetric: false
    subtype_of:
      meaning: source structure/object is a subtype of target
      allowed_source_kinds:
      - structure
      - object
      - definition
      allowed_target_kinds:
      - structure
      - object
      - definition
      inverse_edge_type: null
      transitive: true
      symmetric: false
    instance_of:
      meaning: source example/object is an instance of target class/structure/property
      allowed_source_kinds:
      - example
      - object
      - counterexample
      - non_example
      allowed_target_kinds:
      - definition
      - structure
      - property
      - object
      - theorem
      inverse_edge_type: null
      transitive: false
      symmetric: false
    inherits_from:
      meaning: source inherits operations/properties from target
      allowed_source_kinds:
      - structure
      - object
      allowed_target_kinds:
      - structure
      - object
      inverse_edge_type: null
      transitive: true
      symmetric: false
    constructed_from:
      meaning: source construction/object is built from target item
      allowed_source_kinds:
      - construction
      - structure
      - object
      - proof
      - theorem
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: true
      symmetric: false
    induces:
      meaning: source item canonically induces target item
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: false
      symmetric: false
    has_property:
      meaning: source item has target property
      allowed_source_kinds: *id001
      allowed_target_kinds:
      - property
      - structure
      inverse_edge_type: null
      transitive: false
      symmetric: false
    has_example:
      meaning: source class/result has target as example
      allowed_source_kinds:
      - definition
      - structure
      - property
      - theorem
      allowed_target_kinds:
      - example
      - object
      inverse_edge_type: null
      transitive: false
      symmetric: false
    has_counterexample:
      meaning: source item is linked to target counterexample/non-example, or a counterexample source is attached to its target class when the
        label says so
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: false
      symmetric: false
    shows_necessity_of:
      meaning: source counterexample demonstrates that target assumption/property cannot be dropped
      allowed_source_kinds:
      - counterexample
      - non_example
      - example
      allowed_target_kinds:
      - assumption
      - property
      - structure
      inverse_edge_type: null
      transitive: false
      symmetric: false
    violates_assumption:
      meaning: source example/counterexample violates target assumption/property
      allowed_source_kinds:
      - counterexample
      - non_example
      - example
      allowed_target_kinds:
      - assumption
      - property
      - structure
      inverse_edge_type: null
      transitive: false
      symmetric: false
    motivates:
      meaning: source item motivates target item pedagogically or historically
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: false
      symmetric: false
    prerequisite_for:
      meaning: source is useful or necessary to learn before target
      allowed_source_kinds: *id001
      allowed_target_kinds: *id001
      inverse_edge_type: null
      transitive: true
      symmetric: false
    applied_to:
      meaning: source result/method is applied to target application/context
      allowed_source_kinds:
      - theorem
      - lemma
      - proposition
      - corollary
      - proof_method
      allowed_target_kinds:
      - application
      - construction
      - object
      - theorem
      inverse_edge_type: null
      transitive: false
      symmetric: false

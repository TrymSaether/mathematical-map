views:
  concept_map:
    description: Broad semantic map of Functional Analysis concepts without privileging a tree as the underlying structure.
    included_item_kinds: *id001
    included_edge_types:
    - introduces
    - motivates
    - has_example
    - has_counterexample
    - applied_to
    - implies
    included_dependency_classes:
    - pedagogical_dependency
    - logical_dependency
    - historical_dependency
    root_items:
    - functional_analysis
    example_traversal: functional_analysis --introduces--> banach_space --has_example--> ell_p_spaces
  definition_dependency_graph:
    description: Definitions needed to state concepts and theorems.
    included_item_kinds:
    - definition
    - structure
    - property
    - construction
    - object
    - theorem
    included_edge_types:
    - requires
    - defined_by
    - defines
    - induces
    - constructed_from
    included_dependency_classes:
    - definitional_dependency
    - construction_dependency
    - notation_dependency
    root_items:
    - banach_space
    - spectral_theorem
    example_traversal: spectral_theorem --requires--> self_adjoint_operator --requires--> adjoint_operator --requires--> dual_space
  theorem_dependency_graph:
    description: Logical theorem-to-theorem and theorem-to-tool dependencies.
    included_item_kinds:
    - axiom
    - lemma
    - proposition
    - theorem
    - corollary
    - proof_method
    included_edge_types:
    - uses
    - implies
    - equivalent_to
    - requires
    included_dependency_classes:
    - logical_dependency
    root_items:
    - spectral_theorem
    - open_mapping_theorem
    example_traversal: spectral_theorem --uses--> riesz_representation_theorem --uses--> projection_theorem
  proof_graph:
    description: Proofs as first-class nodes with proof steps, methods, results, and critical assumptions.
    included_item_kinds:
    - proof
    - proof_step
    - proof_method
    - theorem
    - lemma
    - assumption
    included_edge_types:
    - proves
    - uses
    - requires
    - assumes
    included_dependency_classes:
    - logical_dependency
    - assumption_dependency
    root_items:
    - proof_hahn_banach_zorn
    - proof_uniform_boundedness_baire
    example_traversal: proof_hahn_banach_zorn --requires--> step_hb_zorn_maximal_extension --uses--> zorns_lemma
  inheritance_tree:
    description: Tree-like view extracted from subtype and inheritance edges; the graph itself still permits multiple inheritance.
    included_item_kinds:
    - structure
    - object
    - definition
    included_edge_types:
    - subtype_of
    - inherits_from
    included_dependency_classes:
    - definitional_dependency
    root_items:
    - vector_space
    example_traversal: hilbert_space --subtype_of--> inner_product_space and hilbert_space --subtype_of--> banach_space
  construction_graph:
    description: Canonical constructions such as norm-to-metric, metric-to-topology, dual, weak topology, and adjoint.
    included_item_kinds:
    - construction
    - definition
    - structure
    - object
    - property
    included_edge_types:
    - constructed_from
    - induces
    - requires
    included_dependency_classes:
    - construction_dependency
    - definitional_dependency
    root_items:
    - norm
    - dual_space
    - bounded_linear_operator
    example_traversal: norm --induces--> metric_induced_by_norm --induces--> topology_induced_by_metric
  prerequisite_map:
    description: Pedagogical order for learning, distinct from strict logical dependence.
    included_item_kinds: *id001
    included_edge_types:
    - prerequisite_for
    - motivates
    included_dependency_classes:
    - pedagogical_dependency
    root_items:
    - vector_space
    example_traversal: vector_space --prerequisite_for--> normed_vector_space --prerequisite_for--> banach_space --prerequisite_for--> bounded_linear_operator
  application_map:
    description: Results and methods connected to their applications.
    included_item_kinds:
    - theorem
    - lemma
    - corollary
    - proof_method
    - application
    - construction
    - object
    included_edge_types:
    - applied_to
    - uses
    - implies
    included_dependency_classes:
    - logical_dependency
    - pedagogical_dependency
    root_items:
    - hahn_banach_theorem
    - spectral_theorem
    example_traversal: spectral_theorem --applied_to--> operator_spectrum_analysis
query_model:
  description: Query by filtering edges by type and dependency_class, then traversing outgoing, incoming, or both directions. Definitional dependencies
    state what is needed to formulate an item; assumption dependencies state hypotheses needed for truth; logical dependencies state proof/result
    dependencies; pedagogical dependencies state useful learning order.
  node_lookup: Items are addressed by stable snake_case id. Edges are interpreted literally as source --type--> target.
  transitive_closure: For edge types marked transitive, use recursive traversal when the query asks for full dependency closure or inheritance
    ancestors.
  multigraph_rule: Multiple edges between the same source and target may coexist when they express different dependency classes or relations.
example_queries:
- query_name: theorem_dependencies
  start_node_kind: theorem
  edge_filter:
    edge_types:
    - requires
    - uses
    - assumes
    dependency_classes:
    - definitional_dependency
    - logical_dependency
    - assumption_dependency
  traversal_direction: outgoing
  expected_output: list[item]
  example: Start at spectral_theorem; collect required definitions hilbert_space, compact_operator, self_adjoint_operator, spectrum, orthonormal_basis;
    logical tools riesz_representation_theorem, compactness_argument, approximation_argument; assumptions compact_self_adjoint_operator_assumption.
- query_name: definitions_required_to_state_theorem
  start_node_kind: theorem
  edge_filter:
    edge_types:
    - requires
    dependency_classes:
    - definitional_dependency
    - construction_dependency
    - notation_dependency
  traversal_direction: outgoing
  expected_output: list[item]
  example: Start at open_mapping_theorem; traverse requires/definitional_dependency to banach_space, bounded_linear_operator, continuity; optionally
    close transitively to normed_vector_space, completeness, metric_induced_by_norm.
- query_name: proof_methods_used_by_theorem
  start_node_kind: theorem
  edge_filter:
    edge_types:
    - proves
    - uses
    dependency_classes:
    - logical_dependency
  traversal_direction: incoming then outgoing
  expected_output: list[item]
  example: For hahn_banach_theorem, first find incoming proof --proves--> hahn_banach_theorem, then traverse proof_hahn_banach_zorn --uses-->
    duality_argument and zorns_lemma.
- query_name: necessary_assumptions
  start_node_kind: theorem
  edge_filter:
    edge_types:
    - assumes
    dependency_classes:
    - assumption_dependency
  traversal_direction: outgoing
  expected_output: list[item]
  example: For uniform_boundedness_principle, outgoing assumes gives domain_is_banach_space and pointwise_bounded_family_assumption.
- query_name: examples_satisfying_definition
  start_node_kind: definition|structure
  edge_filter:
    edge_types:
    - instance_of
    - has_example
    dependency_classes:
    - pedagogical_dependency
  traversal_direction: incoming|outgoing
  expected_output: list[item]
